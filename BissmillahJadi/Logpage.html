<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="main.js"></script>
  <title>Login Mitra</title>
</head>
<body>
  <div class="background">
    <div class="container">
      <div class="title">
        <p><h3>LOGIN AKUN KOPERASI</h3></p>
      </div>
      <div class="username">
        <input type="text" placeholder="Username" class="input-field">
      </div>
      <div class="password">
        <input type="password" placeholder="Password" class="input-field">
      </div>
      <button class="login-button">Login</button>
      <div class="bwhnya">
        <p>ATAU</p>
      </div>
      <button class="Bikin-akun">Buat Akun</button>
      <div class="remember-me">
        <input type="checkbox" id="remember">
        <label for="remember">Simpan Login</label>
    </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
  const usernameInput = document.querySelector('.username .input-field');
  const passwordInput = document.querySelector('.password .input-field');
  const loginButton = document.querySelector('.login-button');
  const buatAkunButton = document.querySelector('.Bikin-akun');
  const rememberCheckbox = document.querySelector('#remember');

  function showError(input, message) {
    clearError(input);
    const error = document.createElement('span');
    error.className = 'error-message';
    error.textContent = message;
    error.style.color = '#ff4d4d';
    error.style.fontSize = '11px';
    error.style.display = 'block';
    error.style.marginTop = '-5px';
    error.style.marginBottom = '5px';
    input.insertAdjacentElement('afterend', error);
    input.style.border = '1px solid #ff4d4d';
  }

  function clearError(input) {
    const next = input.nextElementSibling;
    if (next && next.classList.contains('error-message')) {
      next.remove();
    }
    input.style.border = '1px solid #5f5f5f';
  }

  function validateFields() {
    let valid = true;

    if (usernameInput.value.trim() === '') {
      showError(usernameInput, 'Username wajib Diisi');
      valid = false;
    } else {
      clearError(usernameInput);
    }

    if (passwordInput.value.trim() === '') {
      showError(passwordInput, 'Password wajib Diisi');
      valid = false;
    } else {
      clearError(passwordInput);
    }

    return valid;
  }

  loginButton.addEventListener('click', (e) => {
    e.preventDefault();

    if (!validateFields()) return;

    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();
    const remember = rememberCheckbox.checked;

    loginButton.disabled = true;
    loginButton.textContent = 'Memproses...';

    setTimeout(() => {
      console.log('Login dengan:', { username, password, remember });

      if (remember) {
        localStorage.setItem('koperasi_username', username);
      } else {
        localStorage.removeItem('koperasi_username');
      }

      // TODO: ganti bagian ini dengan request ke backend asli
      // fetch('/api/login', { method: 'POST', body: JSON.stringify({ username, password }) })

      window.location.href = 'HomeKoperasi.html';
    }, 800);
  });

  buatAkunButton.addEventListener('click', (e) => {
    e.preventDefault();

    window.location.href = 'DaftarKoperasi.html';
  });

  const savedUsername = localStorage.getItem('koperasi_username');
  if (savedUsername) {
    usernameInput.value = savedUsername;
    rememberCheckbox.checked = true;
  }
});
  </script>
</body>
</html>
