<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="main.js"></script>
  <title>KOPDES</title>
</head>
<body>
  <div class="background">
    <div class="navbar">
      <div class="search-box">
        <img src="Search.svg" class="search-logo" alt="search-icon">
        <input type="text" placeholder="Masukkan Barang Kebutuhan">
      </div>
      <div class="nav-icon">
        <button class="icon-btn">
          <img src="Keranjang.svg" alt="Keranjang">
        </button>
        <button class="icon-btn">
          <img src="Message.svg" alt="Message">
        </button>
      </div>
    </div>
      <div class="container-header">
        <div class="wellcome-text">
          <p>Hai, <span id="display-username"></span>!</p>
        </div>
        <div class="header-menu">
          <button class="menu-item">
          <img src="Scan.svg" alt="Scan">
          <span>Scan QR</span>
        </button>
        <button class="menu-item">
          <img src="Wallet.svg" alt="Wallet">
          <span1>Rp.0</span1>
          <span>Isi Saldo KOPDES</span>
        </button>
        <button class="menu-item">
          <img src="Voucher.svg" alt="Voucher">
          <span>Voucher Anda</span>
        </button>
      </div>
    </div>
  </div>
  <div class="background-white">

  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const usernameDisplay = document.getElementById('display-username');
      const savedUsername = localStorage.getItem('koperasi_username');
      
      if (savedUsername) {
        usernameDisplay.textContent = savedUsername
      }
    });
  </script>
</body>
</html>
<style>
  .background {
    background: #ffffff;
    background: linear-gradient(0deg,rgba(255, 255, 255, 1) 29%, rgba(255, 220, 220, 1) 49%, rgba(255, 176, 176, 1) 68%, rgba(255, 159, 159, 1) 72%, rgba(255, 36, 36, 1) 100%);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .navbar{
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    width: 100%;
    height: 60px;
    align-items: center;
    border: none;
    gap: 10px;
    padding: 15px 20px;
    box-sizing: border-box;
    background-color: rgba(251, 3, 3, 0.714);
  }
  .search-box{
    position: relative;
    flex: 1; 
  }
  .search-box input{
    width: 80%;
    max-width: 300px;
    height: 45px;
    border: none;
    border-radius: 5px;
    padding-left: 45px;
    margin: 10px;
    font-size: 16px;
  }
  .search-logo{
    width: 20px;
    height: 20px;
    position: absolute;
    left: 25px;
    top: 50%;
    transform: translateY(-50%)
  }
  .icon-btn{
    width: 40px;
    height: 40px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn img{
    width: 24px;
    height: 24px;
    object-fit: contain;
  }
  .nav-icon{
    display: flex;
  }
  .container-header{
    width: calc(90% - 24px);
    display: block;
    position: absolute;
    top: 80px;
    width: 90%;
    max-width: 700px;
    min-height: 150px;
    padding: 16px;
    border-radius: 16px;
    background-color: white;
    box-sizing: border-box;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1), 0 4px 8px rgba(0, 0, 0, 0.1);
  }
  .wellcome-text p{
    left: 20px;
    font-size: 16px;
    font-weight: 500;
    color: black;
  }
  .header-menu{
    display: flex;
    justify-content: space-around;
    align-items: flex-start;
    margin-top: 15px;
  }
  .menu-item{
    width: 120px;
    height: 90px;
    background: none;
    border: none;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1), 0 4px 8px rgba(0, 0, 0, 0.1);
    border-radius: 5px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 6px;
    cursor: pointer;
  }
  .menu-item img{
    width: 32px;
    height: 32px;
  }
  .menu-item span{
    font-size: 12px;
    color:  #000;
  }
  .menu-item span1{
    color: red;
  }
</style>
